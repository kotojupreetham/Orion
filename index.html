<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion — The Decision Engine</title>
    <meta name="description" content="Orion: A 3D-reactive decision intelligence workspace.">

    <!-- CSS Layers -->
    <link rel="stylesheet" href="css/01-variables.css">
    <link rel="stylesheet" href="css/02-base.css">
    <link rel="stylesheet" href="css/03-layout.css">
    <link rel="stylesheet" href="css/04-components.css">

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
</head>
<body class="no-select">

    <!-- ═══ LOADING ═══ -->
    <div id="loading-screen" class="screen-layer">
        <div class="loader-wrap">
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-ring"></div>
            <div class="loader-text">ORION</div>
        </div>
    </div>

    <!-- ═══ LOGIN ═══ -->
    <div id="login-screen" class="screen-layer hidden">
        <div class="glass login-card">
            <div class="logo" style="font-size:3.2rem; margin-bottom:24px;">ORION</div>
            <h1 style="font-size:1.6rem; font-weight:600; margin-bottom:12px;">Decision Intelligence</h1>
            <p style="color:var(--text-muted); margin-bottom:36px; line-height:1.6;">Your 3D strategic workspace awaits.</p>
            <button id="login-btn" class="google-btn magnetic">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.07 5.07 0 0 1-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>
            <button id="login-theme-btn" class="theme-toggle magnetic" style="margin-top:20px;" title="Toggle theme">☽</button>
        </div>
    </div>

    <!-- ═══ ONBOARDING OVERLAY ═══ -->
    <div id="onboarding-overlay" class="hidden">
        <div class="onboarding-shell">
            <button id="close-onboarding" class="btn btn-ghost onboarding-close magnetic">✕</button>
            <iframe id="onboarding-iframe" class="glass"></iframe>
        </div>
    </div>

    <!-- ═══ MAIN APP ═══ -->
    <div id="app-screen" class="screen-layer hidden">

        <!-- Toolbar (Z: prominent) -->
        <header class="toolbar glass">
            <div class="logo">ORION</div>
            <button id="new-ws-btn" class="btn btn-primary magnetic">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Decision
            </button>
            <div style="display:flex; gap:14px; align-items:center;">
                <span id="badge" class="mono" style="background:var(--ws-active-bg); border:1px solid var(--cyan); padding:4px 12px; border-radius:var(--radius-sm); font-size:0.8rem; color:var(--cyan);"></span>
                <img id="avatar" src="" alt="" style="width:32px; height:32px; border-radius:50%; border:2px solid var(--cyan);">
                <button id="theme-btn" class="theme-toggle magnetic" title="Toggle theme">☽</button>
                <button id="logout-btn" class="btn btn-ghost magnetic" title="Sign out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- IDE Body (Gyro target) -->
        <div class="ide-body" id="ide-body">

            <!-- Sidebar -->
            <aside class="ide-sidebar glass">
                <div class="sidebar-header">Explorer</div>
                <div class="sidebar-list" id="ws-list"></div>
                <p id="no-ws" style="color:var(--text-muted); text-align:center; padding:24px; display:none;">No decisions yet.</p>
            </aside>

            <!-- Center -->
            <main class="ide-main glass">
                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.2" style="filter:drop-shadow(0 0 16px var(--cyan-glow));"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <h3 style="font-size:1.8rem;">Ready to Decide</h3>
                    <p style="color:var(--text-muted);">Create a new decision workspace to begin.</p>
                    <button id="empty-new-btn" class="btn btn-cyan magnetic" style="margin-top:12px;">+ New Decision</button>
                </div>

                <!-- Active Workspace -->
                <div id="ws-view" style="flex:1; display:none; flex-direction:column; height:100%;">
                    <div class="workspace-header">
                        <h2 id="ws-title" contenteditable="true" spellcheck="false" style="font-size:1.5rem; outline:none; line-height:1.3;"></h2>
                        <span id="ws-breadcrumb" class="mono" style="color:var(--text-muted); font-size:0.8rem;"></span>
                    </div>
                    <div class="messages-area" id="msg-area"></div>
                    <div class="input-dock">
                        <div class="input-row">
                            <textarea id="msg-input" class="field" placeholder="Type a decision parameter..." rows="1"></textarea>
                            <button id="send-btn" class="btn btn-cyan magnetic" style="padding:12px 18px; flex-shrink:0;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Right Panel -->
            <aside class="ide-right glass">
                <div id="rp-empty" style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:0.9rem;">Select a workspace</div>
                <div id="rp-content" style="display:none;">
                    <div class="rp-section">
                        <div class="rp-label" style="color:var(--cyan);">Classification</div>
                        <div id="rp-icon" style="font-size:2.8rem; margin:6px 0;">⚡</div>
                        <div id="rp-level" class="rp-value" style="font-size:1.8rem;"></div>
                        <div id="rp-sub" style="color:var(--text-muted); margin-top:4px;"></div>
                    </div>
                    <div class="rp-section">
                        <div class="rp-label" style="color:var(--green);">Score</div>
                        <div class="progress-track"><div id="rp-fill" class="progress-fill" style="width:0%;"></div></div>
                        <div id="rp-score" class="mono" style="margin-top:8px; font-size:1.1rem;">0/7</div>
                    </div>
                    <div class="rp-section">
                        <div class="rp-label" style="color:var(--text-muted);">Stats</div>
                        <div id="rp-date" class="mono" style="font-size:0.85rem; color:var(--text-muted);">—</div>
                        <div id="rp-msgs" class="mono" style="font-size:0.85rem; color:var(--green); margin-top:4px;">0 entries</div>
                    </div>
                </div>
            </aside>
        </div>

        <footer class="status-bar">
            <span><span class="status-dot"></span><span id="status-name">Observer</span></span>
            <span id="status-count" class="mono">0</span>
        </footer>
    </div>

    <!-- Single entry point — no circular imports -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
