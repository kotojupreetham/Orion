<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion — Assessment</title>
    <link rel="stylesheet" href="css/01-variables.css">
    <link rel="stylesheet" href="css/02-base.css">
    <link rel="stylesheet" href="css/04-components.css">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
        // Sync theme from parent/localStorage BEFORE paint
        (function() {
            var t = localStorage.getItem('orion-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Monolith Card */
        .monolith {
            width: 92vw; max-width: 920px;
            min-height: 580px; max-height: 88vh;
            padding: 56px;
            position: relative;
            display: flex; flex-direction: column;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        /* Screen layers inside the monolith */
        .ob-screen {
            position: absolute;
            inset: 56px;
            display: flex; flex-direction: column;
            transform-style: preserve-3d;
        }
        .ob-screen.is-hidden {
            display: none;
            pointer-events: none;
        }

        /* Options — theme-aware and aligned */
        .opt {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px;
            margin-bottom: 10px;
            min-height: 56px;
            border-radius: var(--radius-md);
            background: var(--input-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            box-sizing: border-box;
            transform-style: preserve-3d;
            transition: all 0.25s ease;
        }
        .opt:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
            transform: translateZ(20px);
        }
        .opt.picked {
            border-color: var(--cyan);
            background: var(--ws-active-bg);
            box-shadow: 0 0 28px var(--cyan-glow);
        }
        .opt-key {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem; font-weight: 900;
            color: var(--magenta);
            flex-shrink: 0; width: 48px;
            display: flex; align-items: center; justify-content: center;
        }
        .opt-text {
            font-size: 1.05rem; line-height: 1.55;
            color: var(--text);
            flex: 1;
        }

        .nav-row {
            display: flex; justify-content: space-between;
            margin-top: auto; padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>

    <div class="glass monolith" id="monolith">

        <!-- WELCOME -->
        <div class="ob-screen" id="scr-welcome">
            <h1 class="gradient-text" style="font-size:3rem; margin-bottom:8px;">Decision Assessment</h1>
            <p style="color:var(--green); font-weight:700; letter-spacing:0.18em; font-size:0.85rem; margin-bottom:32px;">COGNITIVE CALIBRATION SEQUENCE</p>
            <p style="font-size:1.1rem; color:var(--text-muted); max-width:560px; line-height:1.7; margin-bottom:48px;">
                This adaptive assessment maps your decision-making style. Your responses shape your workspace classification.
            </p>
            <button class="btn btn-primary magnetic" id="start-btn" style="font-size:1.05rem; padding:14px 32px; align-self:flex-start;">
                Begin Assessment →
            </button>
        </div>

        <!-- QUESTIONS (rendered dynamically) -->
        <div class="ob-screen is-hidden" id="scr-question">
            <p id="q-meta" class="mono" style="color:var(--cyan); font-weight:700; letter-spacing:0.1em; margin-bottom:16px; font-size:0.85rem;"></p>
            <h2 id="q-title" style="font-size:2rem; margin-bottom:14px; color:var(--text);"></h2>
            <p id="q-body" style="font-size:1.05rem; color:var(--text-muted); line-height:1.65; margin-bottom:32px;"></p>
            <div id="q-opts" style="flex:1; overflow-y:auto; transform-style:preserve-3d;"></div>
            <div class="nav-row">
                <button class="btn magnetic" id="back-btn" style="border:1px solid var(--border); color:var(--text-muted);">← Back</button>
                <button class="btn btn-primary magnetic" id="next-btn" style="display:none;">Continue →</button>
            </div>
        </div>

        <!-- RESULT -->
        <div class="ob-screen is-hidden" id="scr-result" style="align-items:center; justify-content:center; text-align:center;">
            <div id="res-icon" style="font-size:5rem; margin-bottom:16px;">⚡</div>
            <h1 id="res-title" class="gradient-text" style="font-size:3.2rem; margin-bottom:8px;"></h1>
            <p id="res-desc" style="font-size:1.1rem; color:var(--text-muted); max-width:520px; line-height:1.65; margin-bottom:48px;"></p>
            <button class="btn btn-cyan magnetic" id="enter-btn" style="font-size:1.1rem; padding:16px 36px;">
                Launch Workspace →
            </button>
        </div>
    </div>

    <script type="module" src="js/assessment/onboarding-flow.js"></script>
</body>
</html>
